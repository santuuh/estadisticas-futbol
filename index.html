<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Estadísticas</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 10px;
    }

    header {
      background: #000;
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 2px solid #222;
    }

    .form-container {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin: 10px 0;
    }

    .form-container label {
      display: block;
      margin: 5px 0 2px;
      font-weight: bold;
    }

    .form-container input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: #000;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 10px;
    }

    .card p {
      margin: 3px 0;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>Mis Estadísticas 2026</header>

  <div class="form-container">
    <label for="rival">Partido:</label>
    <input type="text" id="rival" placeholder="Nombre del rival">

    <label for="goles">Goles:</label>
    <input type="number" id="goles" placeholder="0" min="0">

    <label for="asistencias">Asistencias:</label>
    <input type="number" id="asistencias" placeholder="0" min="0">

    <label for="minutos">Minutos:</label>
    <input type="number" id="minutos" placeholder="0" min="0">

    <button onclick="agregarPartido()">Agregar Partido</button>
  </div>

  <div id="partidos">
    <!-- Las partidas se agregan aquí -->
  </div>

  <script>
    function agregarPartido() {
      let rival = document.getElementById("rival").value;
      let goles = document.getElementById("goles").value;
      let asistencias = document.getElementById("asistencias").value;
      let minutos = document.getElementById("minutos").value;

      if (!rival) {
        alert("El campo Partido es obligatorio");
        return;
      }

      let card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>🆚 ${rival}</h3>
        <p>⚽ Goles: ${goles}</p>
        <p>🎯 Asistencias: ${asistencias}</p>
        <p>⏱️ Minutos: ${minutos}</p>
      `;

      document.getElementById("partidos").appendChild(card);

      // Limpiar inputs
      document.getElementById("rival").value = "";
      document.getElementById("goles").value = "";
      document.getElementById("asistencias").value = "";
      document.getElementById("minutos").value = "";
    }
  </script>
</body>
  </html>
