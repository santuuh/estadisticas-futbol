<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Estadísticas</title>
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 10px;
    }

    header {
      background: #000;
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 2px solid #222;
    }

    .card {
      background: white;
      padding: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 10px;
    }

    .card p {
      margin: 3px 0;
      font-size: 14px;
    }

    button {
      background: #000;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    h1 {
      text-align: center;
      font-size: 20px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <header>Mis Estadísticas 2026</header>

  <h1>Agregar Partido</h1>
  <button onclick="agregarPartido()">+ Nuevo Partido</button>

  <div id="partidos">
    <!-- Cada partido se agregará aquí como card -->
  </div>

  <script>
    function agregarPartido() {
      let rival = prompt("Nombre del rival:");
      let fecha = prompt("Fecha del partido (dd/mm/aaaa):");
      let goles = prompt("Goles:");
      let asistencias = prompt("Asistencias:");
      let minutos = prompt("Minutos jugados:");

      if (!rival || !fecha) return;

      let card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <h3>🆚 ${rival}</h3>
        <p>📅 Fecha: ${fecha}</p>
        <p>⚽ Goles: ${goles}</p>
        <p>🎯 Asistencias: ${asistencias}</p>
        <p>⏱️ Minutos: ${minutos}</p>
      `;

      document.getElementById("partidos").appendChild(card);
    }
  </script>
</body>
  </html>
