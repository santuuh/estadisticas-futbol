<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha Jugador</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 20px;
}

.profile {
  display: flex;
  align-items: center;
  gap: 15px;
}

.profile img {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: #ccc;
}

.name {
  font-size: 22px;
  font-weight: bold;
}

.sub {
  font-size: 14px;
  color: gray;
}

.stats-grid {
  margin-top: 40px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  text-align: center;
  gap: 30px;
}

.stat-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.icon {
  font-size: 40px;
}

.card-yellow {
  width: 50px;
  height: 70px;
  background: yellow;
  margin: auto;
  border-radius: 8px;
}

.card-red {
  width: 50px;
  height: 70px;
  background: red;
  margin: auto;
  border-radius: 8px;
}

.bottom-stats {
  margin-top: 40px;
  display: flex;
  justify-content: space-around;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="profile">
  <img src="" alt="Foto">
  <div>
    <div class="name">Santi</div>
    <div class="sub">Edad: 16</div>
    <div class="sub">Club: Talleres</div>
  </div>
</div>

<div class="stats-grid">
  <div>
    <div class="stat-title">CONVOCADO</div>
    <div class="icon">⚽</div>
  </div>

  <div>
    <div class="stat-title">TITULAR</div>
    <div class="icon">👟</div>
  </div>

  <div>
    <div class="stat-title">SUPLENTE</div>
    <div class="card-yellow"></div>
  </div>

  <div>
    <div class="card-red"></div>
  </div>
</div>

<div class="bottom-stats">
  <div>MINUTOS: 540</div>
  <div>PROM. GOL: 0.75</div>
</div>

</body>
</html>
